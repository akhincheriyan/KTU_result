<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Dashboard - KTU Result Analyzer{% endblock %}</title>
    <link rel="icon" type="image/png" href="{{ url_for('static', filename='favicon.png') }}">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <script>
        (function () {
            const savedTheme = localStorage.getItem('theme') || 'light';
            document.documentElement.setAttribute('data-theme', savedTheme);
        })();
    </script>
    <style>
        :root {
            --sidebar-width: 260px;
        }

        body {
            display: flex;
            background: var(--bg-color);
            overflow: hidden;
            height: 100vh;
        }

        /* Sidebar Styles */
        .sidebar {
            width: var(--sidebar-width);
            background: var(--sidebar-bg);
            backdrop-filter: blur(20px);
            border-right: var(--sidebar-border);
            display: flex;
            flex-direction: column;
            padding: 2rem 1.5rem;
            flex-shrink: 0;
            z-index: 100;
        }

        .sidebar-logo {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            margin-bottom: 3rem;
            text-decoration: none;
            color: var(--sidebar-text-primary);
        }

        .sidebar-logo div {
            background: linear-gradient(135deg, var(--primary-accent), var(--secondary-accent));
            width: 40px;
            height: 40px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 8px 16px -4px rgba(99, 102, 241, 0.4);
        }

        .sidebar-logo span {
            font-weight: 700;
            font-size: 1.1rem;
            letter-spacing: -0.02em;
        }

        .nav-links {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
            flex-grow: 1;
        }

        .nav-item {
            display: flex;
            align-items: center;
            gap: 1rem;
            padding: 0.85rem 1rem;
            border-radius: 12px;
            text-decoration: none;
            color: var(--sidebar-text-secondary);
            font-weight: 500;
            transition: 0.2s;
        }

        .nav-item i {
            font-size: 1.4rem;
        }

        .nav-item:hover {
            background: var(--sidebar-hover-bg);
            color: var(--sidebar-text-primary);
        }

        .nav-item.active {
            background: var(--sidebar-active-bg);
            color: var(--sidebar-active-text);
            border: 1px solid var(--sidebar-active-bg);
        }

        /* Main Content */
        .main-content {
            flex-grow: 1;
            overflow-y: auto;
            position: relative;
            padding: 2rem;
            scroll-behavior: smooth;
        }

        /* Top Header in Dashboard */
        .dash-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
        }

        .user-menu {
            display: flex;
            align-items: center;
            gap: 1rem;
            background: var(--btn-secondary-bg);
            padding: 0.5rem 1rem;
            border-radius: 99px;
            border: var(--glass-border);
        }

        /* Custom Scrollbar */
        .main-content::-webkit-scrollbar {
            width: 8px;
        }

        .main-content::-webkit-scrollbar-track {
            background: transparent;
        }

        .main-content::-webkit-scrollbar-thumb {
            background: var(--text-secondary);
            opacity: 0.3;
            border-radius: 10px;
        }

        .theme-btn {
            background: none;
            border: none;
            color: var(--text-secondary);
            cursor: pointer;
            font-size: 1.2rem;
            padding: 0.5rem;
            display: flex;
            align-items: center;
        }

        @media (max-width: 768px) {
            .sidebar {
                position: fixed;
                bottom: 0;
                left: 0;
                right: 0;
                width: 100%;
                height: 70px;
                flex-direction: row;
                padding: 0 1rem;
                justify-content: space-around;
                align-items: center;
                border-right: none;
                border-top: var(--sidebar-border);
            }

            .sidebar-logo,
            .sidebar-footer {
                display: none;
            }

            .nav-links {
                flex-direction: row;
                width: 100%;
                justify-content: space-around;
            }

            .nav-item {
                flex-direction: column;
                gap: 0.2rem;
                padding: 0.5rem;
                font-size: 0.7rem;
            }

            .main-content {
                padding-bottom: 90px;
            }
        }
    </style>
    {% block extra_head %}{% endblock %}
</head>

<body>
    <aside class="sidebar">
        <a href="{{ url_for('dashboard') }}" class="sidebar-logo">
            <div>
                <img src="{{ url_for('static', filename='favicon.png') }}" alt="Logo"
                    style="width: 24px; height: 24px; border-radius: 4px;">
            </div>
            <span>KTU Analyzer</span>
        </a>

        <nav class="nav-links">
            <a href="{{ url_for('dashboard') }}" class="nav-item {% if active_page == 'converter' %}active{% endif %}">
                <i class="ph ph-file-pdf"></i>
                <span>Converter</span>
            </a>

            <a href="/history" class="nav-item {% if active_page == 'history' %}active{% endif %}">
                <i class="ph ph-clock-counter-clockwise"></i>
                <span>History Logs</span>
            </a>
        </nav>

        <div class="sidebar-footer" style="margin-top: auto; padding-top: 1rem; border-top: var(--sidebar-border);">
            <div
                style="display: flex; align-items: center; gap: 0.75rem; color: var(--sidebar-text-secondary); margin-bottom: 1rem;">
                <i class="ph ph-user-circle" style="font-size: 1.5rem; color: var(--primary-accent);"></i>
                <div
                    style="font-size: 0.85rem; font-weight: 600; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; color: var(--sidebar-text-primary);">
                    {{ user.name }}</div>
            </div>
            <a href="/logout" class="nav-item"
                style="padding: 0.5rem 1rem; background: rgba(239, 68, 68, 0.05); color: var(--danger);">
                <i class="ph ph-sign-out"></i>
                <span>Sign Out</span>
            </a>
        </div>
    </aside>

    <main class="main-content">
        <div class="dash-header">
            <h2 style="font-weight: 700; font-size: 1.5rem;">{% block page_title %}{% endblock %}</h2>
            <div style="display: flex; align-items: center; gap: 1rem;">
                <button class="theme-btn" id="themeToggle" title="Toggle Theme">
                    <i class="ph ph-moon"></i>
                </button>
            </div>
        </div>

        {% block content %}{% endblock %}
    </main>

    <script>
        const themeToggle = document.getElementById('themeToggle');
        const themeIcon = themeToggle.querySelector('i');

        function updateThemeIcon(theme) {
            themeIcon.className = theme === 'dark' ? 'ph ph-moon' : 'ph ph-sun';
        }

        updateThemeIcon(document.documentElement.getAttribute('data-theme'));

        themeToggle.addEventListener('click', () => {
            const currentTheme = document.documentElement.getAttribute('data-theme');
            const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
            document.documentElement.setAttribute('data-theme', newTheme);
            localStorage.setItem('theme', newTheme);
            updateThemeIcon(newTheme);
        });
    </script>
</body>

</html>
